name: Lint

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check .
